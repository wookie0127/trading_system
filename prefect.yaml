# push section allows you to manage if and how this project
# is uploaded to remote locations
push: null

# pull section allows you to provide instructions for cloning
# this project in remote locations
pull:
- prefect.deployments.steps.set_working_directory:
    directory: /app

# the deployments section allows you to provide configuration
# for deploying flows
deployments:
- name: Daily-Yahoo-Intraday
  version: null
  tags: []
  concurrency_limit: null
  description: "yfinance 기반 KOSPI200 + 미국 ETF 바스켓 + 글로벌/코인 1분봉 일일 수집\n주기: 월~금 한국장 종료 후 오후 4시 10분 (10 16 * * 1-5)"
  entrypoint: src/pipelines/daily_yahoo_intraday_orchestrator.py:daily_yahoo_intraday_flow
