services:
  postgres:
    image: postgres:16-alpine
    container_name: prefect-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: prefect
      POSTGRES_USER: prefect
      POSTGRES_PASSWORD: prefect
    ports:
      - "5432:5432"
    volumes:
      - prefect-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prefect -d prefect"]
      interval: 10s
      timeout: 5s
      retries: 10

  postgres-backup:
    image: postgres:16-alpine
    container_name: prefect-postgres-backup
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: prefect
      POSTGRES_DB: prefect
      POSTGRES_USER: prefect
      POSTGRES_HOST: postgres
      BACKUP_INTERVAL_SECONDS: 86400
    volumes:
      - ./backups/postgres:/backups
    command: >
      sh -c 'while true; do
        ts=$$(date +%Y%m%d_%H%M%S);
        pg_dump -h "$$POSTGRES_HOST" -U "$$POSTGRES_USER" -d "$$POSTGRES_DB" -Fc -f "/backups/prefect_$$ts.dump" &&
        find /backups -name "*.dump" -type f -mtime +14 -delete;
        sleep "$$BACKUP_INTERVAL_SECONDS";
      done'

  prefect-server:
    build: .
    container_name: prefect-server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PREFECT_API_DATABASE_CONNECTION_URL: postgresql+asyncpg://prefect:prefect@postgres:5432/prefect
      PREFECT_SERVER_API_HOST: 0.0.0.0
      PREFECT_UI_API_URL: http://localhost:4200/api
    ports:
      - "4200:4200"
    command: prefect server start --host 0.0.0.0
    working_dir: /app

  prefect-worker:
    build: .
    container_name: prefect-worker
    restart: unless-stopped
    depends_on:
      prefect-server:
        condition: service_started
    environment:
      PREFECT_API_URL: http://prefect-server:4200/api
      PREFECT_API_DATABASE_CONNECTION_URL: postgresql+asyncpg://prefect:prefect@postgres:5432/prefect
      TRADING_DATABASE_URL: postgresql://prefect:prefect@postgres:5432/prefect
      PYTHONPATH: /app/src
    env_file:
      - path: .env
        required: false
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./trading_data.db:/app/trading_data.db
      - ./src:/app/src
      - ./config.yaml:/app/config.yaml:ro
      - ./prefect.yaml:/app/prefect.yaml:ro
      - ./README.md:/app/README.md:ro
    command: prefect worker start --pool "default-agent-pool"
    working_dir: /app

  api:
    build: .
    container_name: trading-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - PYTHONPATH=/app/src
    env_file:
      - path: .env
        required: false
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    command: uvicorn api.api:app --host 0.0.0.0 --port 8000
    working_dir: /app/src

  collector:
    build: .
    container_name: trading-collector
    restart: unless-stopped
    environment:
      - PYTHONPATH=/app/src
    env_file:
      - path: .env
        required: false
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    command: python runners/intraday_collector_daemon.py
    working_dir: /app/src

volumes:
  prefect-postgres-data:
