version: '3.8'

services:
  api:
    build: .
    container_name: trading-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - PYTHONPATH=/app/src
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    command: uvicorn api:app --host 0.0.0.0 --port 8000
    working_dir: /app/src

  collector:
    build: .
    container_name: trading-collector
    restart: unless-stopped
    environment:
      - PYTHONPATH=/app/src
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    command: python intraday_collector_daemon.py
    working_dir: /app/src

volumes:
  data:
  logs:
